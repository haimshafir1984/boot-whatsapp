<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>כניסה לניהול הקמפיינים</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0; min-height: 100vh; display: grid; place-items: center;
      padding: 20px; font-family: 'Segoe UI', Arial, sans-serif;
      color: #111827; background: #f3f4f6;
    }
    main {
      width: min(420px, 100%); background: #fff; border: 1px solid #e5e7eb;
      border-radius: 8px; padding: 30px 26px;
    }
    h1 { font-size: 1.2rem; margin: 0 0 8px; }
    p { color: #6b7280; font-size: .88rem; line-height: 1.5; margin: 0 0 20px; }
    label { display: block; font-size: .82rem; font-weight: 600; margin-bottom: 6px; }
    input {
      width: 100%; padding: 11px 12px; font-size: .95rem; border-radius: 7px;
      border: 1.5px solid #d1d5db; margin-bottom: 14px;
    }
    input:focus { outline: none; border-color: #16a34a; }
    button {
      width: 100%; border: none; border-radius: 7px; padding: 12px;
      font-size: .94rem; font-weight: 700; background: #16a34a; color: #fff;
      cursor: pointer;
    }
    button:hover { background: #15803d; }
    #error { min-height: 20px; color: #b91c1c; font-size: .82rem; margin-top: 12px; }
  </style>
</head>
<body>
  <main>
    <h1>כניסה לניהול הקמפיינים</h1>
    <p>הזיני את קוד הגישה שקיבלת כדי לנהל את החשבון שלך.</p>
    <form id="loginForm">
      <label for="accessCode">קוד גישה</label>
      <input id="accessCode" type="password" autocomplete="current-password" required />
      <button type="submit">כניסה</button>
      <div id="error"></div>
    </form>
  </main>
  <script>
    document.getElementById('loginForm').addEventListener('submit', async (event) => {
      event.preventDefault();
      const error = document.getElementById('error');
      error.textContent = '';
      const response = await fetch('/auth/client/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ accessCode: document.getElementById('accessCode').value }),
      });
      if (response.ok) {
        window.location.href = '/client/';
        return;
      }
      const body = await response.json().catch(() => ({}));
      error.textContent = body.error || 'לא ניתן להתחבר';
    });
  </script>
</body>
</html>
