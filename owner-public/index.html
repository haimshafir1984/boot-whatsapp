<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>דשבורד מנהלים</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0; min-height: 100vh; background: #f5f6f8; color: #111827;
      font-family: 'Segoe UI', Arial, sans-serif;
    }
    header {
      height: 62px; background: #fff; border-bottom: 1px solid #e5e7eb;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 max(20px, calc((100vw - 1080px) / 2));
    }
    header h1 { font-size: 1.05rem; margin: 0; }
    header button { border: 1px solid #d1d5db; background: #fff; border-radius: 7px; padding: 8px 12px; cursor: pointer; }
    main { max-width: 1080px; margin: 0 auto; padding: 26px 20px; }
    .top {
      display: flex; align-items: end; justify-content: space-between; gap: 18px;
      margin-bottom: 22px;
    }
    h2 { font-size: 1.38rem; margin: 0 0 5px; }
    .sub { color: #6b7280; font-size: .88rem; }
    .create {
      display: grid; grid-template-columns: repeat(7, minmax(120px, 1fr)) auto;
      gap: 8px; min-width: min(620px, 100%);
    }
    input, select {
      flex: 1; padding: 10px 12px; border: 1px solid #d1d5db; border-radius: 7px;
      font-size: .9rem;
    }
    .primary {
      background: #16a34a; color: #fff; border: none; padding: 10px 16px;
      border-radius: 7px; font-weight: 700; cursor: pointer; white-space: nowrap;
    }
    .notice {
      border: 1px solid #dbeafe; background: #eff6ff; color: #1e3a8a;
      padding: 12px 14px; border-radius: 8px; font-size: .84rem; margin-bottom: 18px;
    }
    .bulk-actions {
      display: flex; align-items: center; justify-content: space-between; gap: 12px;
      border: 1px solid #e5e7eb; background: #fff; padding: 12px 14px;
      border-radius: 8px; margin-bottom: 18px;
    }
    .bulk-actions strong { display: block; font-size: .9rem; margin-bottom: 3px; }
    .bulk-actions span { color: #6b7280; font-size: .8rem; line-height: 1.45; }
    .bulk-redeploy {
      border: 1px solid #2563eb; background: #2563eb; color: #fff;
      border-radius: 7px; padding: 9px 13px; cursor: pointer; font-weight: 700;
      white-space: nowrap;
    }
    .bulk-redeploy:disabled { opacity: .65; cursor: progress; }
    table { width: 100%; border-collapse: collapse; background: #fff; border: 1px solid #e5e7eb; }
    th, td { text-align: right; padding: 12px 13px; border-bottom: 1px solid #e5e7eb; font-size: .84rem; }
    th { background: #f9fafb; color: #6b7280; font-size: .75rem; }
    .status { border-radius: 99px; padding: 4px 9px; font-weight: 600; white-space: nowrap; }
    .status.pending, .status.provisioning, .status.deploying { background: #fef3c7; color: #92400e; }
    .status.ready { background: #dcfce7; color: #166534; }
    .status.failed { background: #fee2e2; color: #991b1b; }
    .code { font-family: Consolas, monospace; direction: ltr; display: inline-block; font-size: .78rem; color: #374151; }
    .copy { border: 1px solid #d1d5db; background: #fff; border-radius: 6px; padding: 5px 8px; cursor: pointer; margin-right: 8px; }
    .open {
      display: inline-block; border: 1px solid #d1d5db; background: #fff; color: #111827;
      border-radius: 6px; padding: 7px 10px; text-decoration: none; font-weight: 600;
    }
    .client-link { color: #1d4ed8; text-decoration: none; direction: ltr; display: inline-block; font-size: .79rem; }
    .client-link:hover { text-decoration: underline; }
    .webhook-admin {
      margin-top: 8px;
      padding: 8px;
      border: 1px solid #dbeafe;
      border-radius: 7px;
      background: #eff6ff;
      color: #1e3a8a;
      font-size: .76rem;
    }
    .webhook-admin .code {
      display: block;
      margin-top: 4px;
      max-width: 260px;
      overflow-wrap: anywhere;
      white-space: normal;
    }
    .twilio-number {
      display: block;
      margin-top: 5px;
      color: #6b7280;
      font-size: .76rem;
      direction: ltr;
      text-align: right;
    }
    .retry { border: 1px solid #fecaca; background: #fff; color: #b91c1c; border-radius: 6px; padding: 6px 9px; cursor: pointer; margin-top: 6px; }
    .check-ready { border: 1px solid #d1d5db; background: #fff; color: #374151; border-radius: 6px; padding: 6px 9px; cursor: pointer; margin-top: 6px; }
    .delete-client { border: 1px solid #fecaca; background: #fff1f2; color: #b91c1c; border-radius: 6px; padding: 7px 10px; cursor: pointer; font-weight: 700; }
    .actions { display: flex; flex-wrap: wrap; gap: 7px; align-items: center; }
    .empty { background: #fff; border: 1px solid #e5e7eb; padding: 42px; text-align: center; color: #6b7280; border-radius: 8px; }
    #error { color: #b91c1c; font-size: .8rem; margin-top: 8px; min-height: 18px; }
    @media (max-width: 760px) {
      .top { flex-direction: column; align-items: stretch; }
      .create { min-width: 0; grid-template-columns: 1fr; }
      .bulk-actions { display: block; }
      .bulk-redeploy { width: 100%; margin-top: 10px; }
      table, thead, tbody, tr, th, td { display: block; }
      thead { display: none; }
      tr { padding: 10px 0; border-bottom: 1px solid #e5e7eb; }
      td { border: none; padding: 5px 12px; }
    }
  </style>
</head>
<body>
  <header>
    <h1>דשבורד מנהלים</h1>
    <button onclick="logout()">יציאה</button>
  </header>
  <main>
    <div class="top">
      <div>
        <h2>יחידות לקוחה</h2>
        <div class="sub">לקוחות מבודדים המוכנים להקמה והפצה.</div>
      </div>
      <form class="create" id="createForm">
        <input id="clientName" type="text" placeholder="שם הלקוחה" required />
        <input id="clientAccessCode" type="password" minlength="8" placeholder="סיסמת כניסה ללקוחה" autocomplete="new-password" required />
        <select id="clientPlan" onchange="syncPlanDefaults()">
          <option value="basic">מוכן להפעלה</option>
          <option value="self_service" selected>עצמאי</option>
          <option value="advanced">Twilio מתקדם</option>
        </select>
        <input id="clientTwilioFrom" type="tel" dir="ltr" placeholder="מספר Twilio +16602902811" style="display:none" />
        <input id="clientBotReplyDelay" type="number" min="0" max="60000" step="100" dir="ltr" placeholder="דיליי הודעות במילישניות, למשל 1000" style="display:none" />
        <input id="clientMaxCampaigns" type="number" min="1" max="50" value="7" placeholder="מקס׳ קמפיינים" />
        <input id="clientExpiresAt" type="date" />
        <button class="primary" type="submit">צור יחידת לקוחה</button>
      </form>
    </div>
    <div class="notice">
      בעת יצירת לקוחה המערכת מקימה עבורה שירות ושטח אחסון נפרדים בשרת הפרטי. בסיום יופיע לינק אישי, ואת הסיסמה שולחים בנפרד.
    </div>
    <div class="bulk-actions">
      <div>
        <strong>עדכון כל יחידות הלקוחות</strong>
        <span>מפעיל פריסה מחדש לכל הלקוחות, כדי שכל דפי הלקוח יקבלו את הגרסה האחרונה של המערכת.</span>
      </div>
      <button class="bulk-redeploy" id="redeployAllBtn" onclick="redeployAllClients()">פרוס מחדש את כל הלקוחות</button>
    </div>
    <div id="error"></div>
    <div id="clients"></div>
  </main>
  <script>
    function esc(value) {
      return String(value).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }

    function statusLabel(status) {
      return {
        pending_setup: 'ממתין להקמה',
        pending_railway_setup: 'ממתין להקמה',
        provisioning: 'מוקם כעת...',
        deploying: 'הפריסה התחילה',
        ready: 'מוכן לשליחה',
        failed: 'ההקמה נכשלה',
        disabled: 'מושבת',
      }[status] || status;
    }

    function syncPlanDefaults() {
      const plan = document.getElementById('clientPlan').value;
      document.getElementById('clientMaxCampaigns').value =
        plan === 'advanced' ? '5' : plan === 'basic' ? '1' : '7';
      const twilioInput = document.getElementById('clientTwilioFrom');
      twilioInput.style.display = plan === 'advanced' ? '' : 'none';
      twilioInput.required = plan === 'advanced';
      const delayInput = document.getElementById('clientBotReplyDelay');
      delayInput.style.display = plan === 'advanced' ? '' : 'none';
      if (plan === 'advanced' && !delayInput.value) delayInput.value = '1000';
    }

    function displayTwilioFrom(value) {
      return value ? String(value).replace(/^whatsapp:/i, '') : '';
    }

    function displayDelay(value) {
      const delay = Number(value ?? 1000);
      return Number.isFinite(delay) ? `${delay}ms` : '1000ms';
    }

    function getTwilioWebhookUrl(client) {
      if (client.whatsappProvider !== 'TWILIO_API' || !client.managementUrl) return '';
      if (client.twilioWebhookUrl) return client.twilioWebhookUrl;
      try {
        return `${new URL(client.managementUrl).origin}/webhooks/twilio/whatsapp`;
      } catch (_) {
        return '';
      }
    }

    async function loadClients() {
      const response = await fetch('/owner/api/clients');
      if (response.status === 401) {
        window.location.href = '/owner/login';
        return;
      }
      const clients = await response.json();
      const el = document.getElementById('clients');
      if (!clients.length) {
        el.innerHTML = '<div class="empty">עדיין לא נוצרו יחידות לקוחה.</div>';
        return;
      }
      el.innerHTML = `
        <table>
          <thead><tr><th>לקוחה</th><th>סטטוס</th><th>לינק ללקוחה</th><th>סיסמת כניסה</th><th>ניהול</th></tr></thead>
          <tbody>${clients.map(client => {
              const webhookUrl = getTwilioWebhookUrl(client);
              return `
            <tr>
              <td><strong>${esc(client.name)}</strong>${client.twilioFrom ? `<span class="twilio-number">${esc(displayTwilioFrom(client.twilioFrom))} | דיליי ${esc(displayDelay(client.botReplyDelayMs))}</span>` : ''}</td>
              <td>
                <span class="status ${esc(client.provisioningStatus)}">${statusLabel(client.provisioningStatus)}</span>
                ${client.provisioningStatus === 'failed' ? `<div><button class="retry" onclick="retryProvision('${encodeURIComponent(client.id)}')">נסה שוב</button>${client.managementUrl ? ` <button class="check-ready" onclick="checkReady('${encodeURIComponent(client.id)}')">בדוק מוכנות</button>` : ''}</div>` : ''}
                ${client.provisioningStatus === 'deploying' ? `<div><button class="check-ready" onclick="checkReady('${encodeURIComponent(client.id)}')">בדוק מוכנות</button></div>` : ''}
              </td>
              <td>
                ${client.managementUrl ? `<a class="client-link" href="${esc(client.managementUrl)}" target="_blank">${esc(client.managementUrl)}</a>` : '-'}
                ${webhookUrl ? `<div class="webhook-admin">Webhook ל-Twilio <span class="code">${esc(webhookUrl)}</span><button class="copy" onclick="copyCode('${esc(webhookUrl)}')">העתק</button></div>` : ''}
              </td>
              <td>
                <span class="code">${esc(client.accessCode)}</span>
                <button class="copy" onclick="copyCode('${esc(client.accessCode)}')">העתק</button>
              </td>
              <td>
                <div class="actions">
                  <a class="open" href="/owner/client.html?id=${encodeURIComponent(client.id)}">פתח עמוד לקוחה</a>
                  <button class="delete-client" onclick="deleteClient('${encodeURIComponent(client.id)}')">מחק</button>
                </div>
              </td>
            </tr>`;
            }).join('')}</tbody>
        </table>`;
    }

    document.getElementById('createForm').addEventListener('submit', async (event) => {
      event.preventDefault();
      const error = document.getElementById('error');
      const button = event.target.querySelector('button[type="submit"]');
      error.textContent = '';
      button.disabled = true;
      button.textContent = 'מקים יחידה...';
      const response = await fetch('/owner/api/clients', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          name: document.getElementById('clientName').value,
          accessCode: document.getElementById('clientAccessCode').value,
          plan: document.getElementById('clientPlan').value,
          twilioFrom: document.getElementById('clientTwilioFrom').value,
          botReplyDelayMs: document.getElementById('clientBotReplyDelay').value,
          maxCampaigns: Number(document.getElementById('clientMaxCampaigns').value),
          serviceExpiresAt: document.getElementById('clientExpiresAt').value
            ? new Date(document.getElementById('clientExpiresAt').value + 'T23:59:59').toISOString()
            : undefined,
        }),
      });
      const body = await response.json().catch(() => ({}));
      if (!response.ok) {
        error.textContent = body.error || 'יצירת הלקוחה נכשלה';
        button.disabled = false;
        button.textContent = 'צור יחידת לקוחה';
        loadClients();
        return;
      }
      document.getElementById('clientName').value = '';
      document.getElementById('clientAccessCode').value = '';
      document.getElementById('clientTwilioFrom').value = '';
      document.getElementById('clientBotReplyDelay').value = '';
      document.getElementById('clientPlan').value = 'self_service';
      syncPlanDefaults();
      document.getElementById('clientExpiresAt').value = '';
      button.disabled = false;
      button.textContent = 'צור יחידת לקוחה';
      loadClients();
    });

    async function retryProvision(id) {
      const error = document.getElementById('error');
      error.textContent = '';
      const response = await fetch(`/owner/api/clients/${id}/provision`, { method: 'POST' });
      const body = await response.json().catch(() => ({}));
      if (!response.ok) error.textContent = body.error || 'הקמת הלקוחה נכשלה';
      loadClients();
    }

    async function checkReady(id) {
      await fetch(`/owner/api/clients/${id}/check-ready`, { method: 'POST' });
      loadClients();
    }

    async function redeployAllClients() {
      if (!confirm('לפרוס מחדש את כל יחידות הלקוחות? הפעולה יכולה לקחת כמה דקות.')) return;
      const error = document.getElementById('error');
      const button = document.getElementById('redeployAllBtn');
      error.textContent = '';
      button.disabled = true;
      button.textContent = 'מפעיל פריסה לכל הלקוחות...';
      try {
        const response = await fetch('/owner/api/clients/redeploy-all', { method: 'POST' });
        const body = await response.json().catch(() => ({}));
        if (!response.ok) {
          error.textContent = body.error || 'הפריסה לכל הלקוחות נכשלה';
          return;
        }
        const failedText = body.failed
          ? ` ${body.failed} נכשלו וצריך לבדוק ידנית.`
          : '';
        error.textContent = `הפריסה הופעלה: ${body.succeeded || 0} מתוך ${body.total || 0} לקוחות.${failedText}`;
        loadClients();
      } catch (err) {
        error.textContent = 'לא ניתן להפעיל כרגע פריסה לכל הלקוחות';
      } finally {
        button.disabled = false;
        button.textContent = 'פרוס מחדש את כל הלקוחות';
      }
    }

    function copyCode(code) {
      navigator.clipboard.writeText(code);
    }

    async function deleteClient(id) {
      const first = confirm('למחוק את הלקוחה? הפעולה תמחק את היחידה המבודדת ואת הרשומה בדשבורד.');
      if (!first) return;
      const typed = prompt('כדי לאשר מחיקה, הקלד/י: מחק');
      if (typed !== 'מחק') return;
      const error = document.getElementById('error');
      error.textContent = '';
      const response = await fetch(`/owner/api/clients/${id}`, { method: 'DELETE' });
      const body = await response.json().catch(() => ({}));
      if (!response.ok || body.ok === false) {
        error.textContent = body.error || 'מחיקת הלקוחה נכשלה';
        return;
      }
      if (body.warnings?.length) {
        error.textContent = `הלקוחה נמחקה, אבל יש אזהרות: ${body.warnings.join(' | ')}`;
      }
      loadClients();
    }

    async function logout() {
      await fetch('/auth/owner/logout', { method: 'POST' });
      window.location.href = '/owner/login';
    }

    syncPlanDefaults();
    loadClients();
  </script>
</body>
</html>
